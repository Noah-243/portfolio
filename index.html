  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const frames = document.querySelectorAll('.hero-text-frame, .contact-frame');
        frames.forEach(frame => {
          frame.style.setProperty('backdrop-filter', 'blur(2px)', 'important');
          frame.style.setProperty('-webkit-backdrop-filter', 'blur(2px)', 'important');
        });
      });
    </script>
  </body>
